<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>農村療癒護照 Rural Healing Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F2E8;--paper:#FFFDF7;--green:#5D6F37;--deep:#26351F;--gold:#C79B48;--ink:#2B241E;--muted:#827768;--line:rgba(88,71,47,.14);--shadow:0 22px 55px rgba(49,45,35,.12);--soft-shadow:0 14px 32px rgba(49,45,35,.08);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans TC",sans-serif;color:var(--ink);background:linear-gradient(180deg,#FBF7ED 0%,#F7F2E8 45%,#EFE7D7 100%);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;min-height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px clamp(18px,4vw,56px);background:rgba(255,253,247,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(93,111,55,.12);box-shadow:0 8px 26px rgba(57,49,35,.06)}
.brand{display:flex;align-items:center;gap:12px;min-width:220px}
.logo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--green),#8B9A58);display:grid;place-items:center;color:white}
.logo svg{width:28px;height:28px}
.brand h1{font-size:1.08rem;margin:0;font-family:"Noto Serif TC",serif;letter-spacing:.08em;color:var(--deep);font-weight:900}
.brand span{display:block;font-size:.58rem;letter-spacing:.18em;color:var(--muted);font-weight:700;margin-top:3px}
.nav-links{display:flex;gap:8px;align-items:center;justify-content:center;flex:1}
.nav-link{padding:11px 16px;border-radius:999px;color:#4C463B;font-weight:700;font-size:.92rem;transition:.25s;cursor:pointer}
.nav-link:hover,.nav-link.active{background:#F4EFDF;color:var(--deep)}
.member{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:999px;background:#F5F0E4;font-size:.85rem;font-weight:800;color:var(--deep)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#D7B56D,#5D6F37);border:2px solid white}
.lang-switch{display:flex;gap:6px;align-items:center;margin-left:10px;background:#F5F0E4;border:1px solid rgba(93,111,55,.12);border-radius:999px;padding:5px}
.lang-label{font-size:.75rem;font-weight:900;color:var(--deep);padding-left:8px}
.lang-btn{border:none;background:transparent;color:var(--muted);font-weight:900;border-radius:999px;padding:7px 10px;cursor:pointer;font-size:.78rem}
.lang-btn.active{background:var(--deep);color:white}
.menu-btn{display:none;background:#F4EFDF;border:1px solid var(--line);border-radius:14px;padding:10px;color:var(--deep)}

.section{padding:96px clamp(18px,4vw,54px) 50px;max-width:1320px;margin:0 auto;scroll-margin-top:96px}
.hero{min-height:760px;max-width:none;padding:0;margin:0;position:relative;display:flex;align-items:flex-end;background:#314125;overflow:hidden}
.hero-img{position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(28,35,19,.72),rgba(28,35,19,.20)),linear-gradient(0deg,rgba(247,242,232,.82),rgba(247,242,232,0) 28%),url("images/hero.jpg");background-size:cover;background-position:center}
.hero-content{position:relative;z-index:2;width:100%;padding:130px clamp(24px,7vw,96px) 210px;color:white}
.kicker{display:inline-flex;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;font-weight:800;font-size:.86rem;letter-spacing:.12em}
.hero h2{font-family:"Noto Serif TC",serif;font-size:clamp(2.3rem,5.6vw,5.3rem);line-height:1.18;margin:24px 0 22px;font-weight:900;letter-spacing:.08em;text-shadow:0 8px 26px rgba(0,0,0,.28)}
.hero p{font-size:1.06rem;line-height:2;max-width:650px;color:rgba(255,255,255,.92);font-weight:500}
.cta-row{display:flex;gap:14px;margin-top:32px;flex-wrap:wrap}
.btn{border:none;border-radius:999px;padding:14px 22px;font-weight:900;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:9px;font-size:.95rem}
.btn-primary{background:white;color:var(--deep);box-shadow:0 16px 30px rgba(0,0,0,.16)}
.btn-primary:hover,.btn-ghost:hover{transform:translateY(-3px)}
.btn-ghost{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.45);color:white}

.journey-panel{position:relative;z-index:5;margin:-132px auto 0;max-width:1180px;background:rgba(255,253,247,.94);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);border-radius:34px;padding:30px}
.panel-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px}
.panel-head h3,.section-title h2{font-family:"Noto Serif TC",serif;color:var(--deep);font-size:clamp(1.6rem,3vw,2.4rem);margin:0;font-weight:900;letter-spacing:.05em}
.panel-head p,.section-title p{color:var(--muted);line-height:1.8;margin:8px 0 0;font-weight:500}
.journey-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.journey-card{background:linear-gradient(180deg,#FFFDF8,#F8F1E2);border:1px solid rgba(93,111,55,.12);border-radius:24px;padding:24px 16px;text-align:center;min-height:210px;cursor:pointer;transition:.28s;box-shadow:0 12px 28px rgba(61,55,42,.06)}
.journey-card:hover,.activity-card:hover,.stamp:hover{transform:translateY(-6px);box-shadow:var(--shadow)}
.journey-icon{font-size:2.5rem;margin-bottom:10px}
.journey-card h4{font-family:"Noto Serif TC",serif;font-size:1.34rem;margin:8px 0;color:var(--deep);font-weight:900}
.journey-card small{display:block;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:900;font-size:.68rem;margin-bottom:8px}
.journey-card p{color:var(--muted);font-size:.86rem;line-height:1.7;margin:0 0 16px}
.tiny-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(93,111,55,.15);border-radius:999px;padding:8px 12px;background:white;color:var(--deep);font-weight:800;font-size:.78rem;cursor:pointer}

.section-title{display:flex;justify-content:space-between;align-items:end;gap:20px;margin:0 0 24px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 26px}
.filter-btn{border:1px solid rgba(93,111,55,.16);background:#FFFDF7;border-radius:999px;padding:10px 15px;color:var(--deep);font-weight:800;cursor:pointer;transition:.2s}
.filter-btn.active,.filter-btn:hover{background:var(--deep);color:white}
.activities{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.activity-card{background:var(--paper);border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--soft-shadow);transition:.25s;cursor:pointer}
.img-slot{height:190px;background-image:var(--card-img);background-size:cover;background-position:center}
.activity-body{padding:18px}
.tag{display:inline-flex;background:#EEF2DD;color:var(--green);border-radius:999px;padding:5px 9px;font-size:.72rem;font-weight:900;margin-bottom:9px}
.activity-body h3{font-family:"Noto Serif TC",serif;font-size:1.25rem;margin:0 0 9px;color:var(--deep)}
.activity-body p{color:var(--muted);line-height:1.7;margin:0}
.meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:.8rem;margin:10px 0 16px}
.stars{color:#C79B48;letter-spacing:.08em;font-weight:900}
.price-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
.price{font-size:1.18rem;font-weight:900;color:var(--ink)}
.book-btn{background:var(--green);color:white;border:none;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;transition:.22s}
.book-btn:hover{background:var(--deep)}
.collect-btn{background:#FFFDF8;color:var(--deep);border:1px solid rgba(93,111,55,.2);border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}

.passport-section{display:grid;grid-template-columns:1.05fr 1.4fr;gap:24px;align-items:stretch}
.passport-card,.glass-card{background:rgba(255,253,247,.82);border:1px solid rgba(255,255,255,.8);border-radius:30px;box-shadow:var(--soft-shadow);padding:24px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.stat{background:#F7F1E3;border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center}
.stat strong{font-size:2rem;color:var(--deep)}
.stat span{display:block;color:var(--muted);font-weight:800;font-size:.78rem}
.stamp-overview{height:260px;border-radius:22px;background:#F8F0DF url("images/stamps.jpg") center/contain no-repeat;border:1px solid var(--line);box-shadow:var(--soft-shadow);margin-top:20px}
.passport-cover{height:260px;border-radius:22px;background:linear-gradient(145deg,#56663B,#20311C);color:#F8EBCF;padding:28px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 28px rgba(40,43,28,.2);transform:rotate(-2deg);max-width:240px;margin:28px auto 0}
.passport-cover h3{font-family:"Noto Serif TC",serif;font-size:1.5rem;margin:0;letter-spacing:.12em}
.passport-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tab{border:1px solid var(--line);background:#FFFDF8;color:var(--muted);border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer}
.tab.active{background:var(--deep);color:white}
.stamp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stamp{border:1px solid var(--line);border-radius:20px;min-height:148px;background:#F9F2E4;padding:14px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:.58;filter:grayscale(.35);transition:.22s;cursor:pointer}
.stamp.done{opacity:1;filter:none;background:#FFFDF7}
.stamp-img{width:76px;height:76px;border-radius:50%;background-image:var(--stamp-img);background-size:cover;background-position:center;border:3px double rgba(93,111,55,.45)}
.stamp b{color:var(--deep)}
.stamp small{color:var(--muted);font-weight:800}
.reward-list{display:grid;gap:12px}
.reward{background:#FFFDF8;border:1px solid var(--line);border-radius:20px;padding:16px}
.reward b{color:var(--deep)}
.reward span{color:var(--muted);font-size:.85rem}
.progress{height:8px;background:#EEE5D1;border-radius:999px;overflow:hidden;margin-top:12px}
.progress i{display:block;height:100%;background:var(--green);border-radius:999px}
.placeholder-note{border:1px dashed rgba(93,111,55,.35);background:#FAF5E9;border-radius:18px;padding:20px;color:var(--muted);font-weight:800;text-align:center;line-height:1.8}

.story-community{display:grid;grid-template-columns:1.25fr .75fr;gap:24px}
.story-card{min-height:360px;border-radius:28px;overflow:hidden;position:relative;background-image:linear-gradient(90deg,rgba(31,39,23,.75),rgba(31,39,23,.08)),url("images/acong.jpg");background-size:cover;background-position:center;color:white;box-shadow:var(--soft-shadow);cursor:pointer}
.story-content{position:absolute;left:30px;bottom:28px;max-width:420px;z-index:2}
.story-content h3{font-family:"Noto Serif TC",serif;font-size:2rem;margin:0 0 10px}
.story-content p{line-height:1.8;color:rgba(255,255,255,.9)}
.feed{display:grid;gap:12px}
.post{display:flex;gap:12px;background:#FFFDF8;border:1px solid var(--line);border-radius:18px;padding:14px}
.post b{display:block;color:var(--deep)}
.post p{margin:4px 0 0;color:var(--muted);font-size:.86rem;line-height:1.55}
.footer-cta{max-width:none;margin:40px 0 0;padding:42px clamp(24px,8vw,96px);background:linear-gradient(135deg,#556632,#26351F);color:white;display:flex;align-items:center;justify-content:space-between;gap:24px}
.footer-cta h2{font-family:"Noto Serif TC",serif;margin:0;font-size:2rem}
.footer-cta p{margin:8px 0 0;color:rgba(255,255,255,.78)}

.detail-page{display:none;padding-top:104px}
.detail-page.active{display:block}
.back-btn{margin:20px 0;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 15px;font-weight:900;color:var(--deep);cursor:pointer}
.detail-hero{border-radius:34px;min-height:410px;display:flex;align-items:flex-end;padding:42px;position:relative;overflow:hidden;box-shadow:var(--shadow);color:white;background:#7C8D52}
.detail-hero::before{content:"";position:absolute;inset:0;background-image:var(--detail-img);background-size:cover;background-position:center;opacity:.58}
.detail-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(27,36,20,.82),rgba(27,36,20,.18))}
.detail-hero>div{position:relative;z-index:2}
.detail-hero h2{font-family:"Noto Serif TC",serif;font-size:3rem;margin:0 0 12px}
.detail-hero p{line-height:1.8;max-width:760px}
.detail-hero .tag{background:rgba(255,253,247,.9);color:var(--deep)}
.detail-layout{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;margin-top:24px}
.content-box{background:var(--paper);border:1px solid var(--line);border-radius:26px;padding:26px;box-shadow:var(--soft-shadow)}
.content-box h3{font-family:"Noto Serif TC",serif;color:var(--deep);margin-top:0}
.timeline{display:grid;gap:12px}
.step{display:flex;gap:13px;align-items:flex-start}
.dot{width:28px;height:28px;border-radius:50%;background:var(--green);color:white;display:grid;place-items:center;font-weight:900;flex:0 0 auto}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.info-list{display:grid;gap:12px}
.info-pill{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dashed var(--line);padding-bottom:12px;color:var(--muted);font-weight:800}
.info-pill b{color:var(--deep)}

.modal{position:fixed;inset:0;background:rgba(25,28,20,.55);z-index:2000;display:none;align-items:center;justify-content:center;padding:24px}
.modal.active{display:flex}
.modal-card{max-width:620px;width:100%;background:var(--paper);border-radius:28px;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.modal-card h3{font-family:"Noto Serif TC",serif;color:var(--deep);font-size:1.8rem;margin:0 0 10px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
.field{display:grid;gap:6px}
.field label{font-weight:900;color:var(--deep);font-size:.82rem}
.field input,.field select{border:1px solid var(--line);border-radius:14px;padding:12px;background:#FFFDF8}
.close{float:right;border:none;background:#F1E7D2;border-radius:50%;width:36px;height:36px;font-weight:900;cursor:pointer}
.reveal{opacity:0;transform:translateY(24px);transition:.6s}
.reveal.show{opacity:1;transform:none}

@media(max-width:1040px){
  .activities{grid-template-columns:repeat(2,1fr)}
  .journey-grid{grid-template-columns:repeat(2,1fr)}
  .passport-section,.story-community,.detail-layout{grid-template-columns:1fr}
  .footer-cta{display:block}
  .stamp-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:780px){
  .nav{padding:12px 16px}
  .member,.nav-links,.lang-switch{display:none}
  .menu-btn{display:block}
  .nav.open .nav-links{position:absolute;top:74px;left:14px;right:14px;display:grid;background:rgba(255,253,247,.98);padding:12px;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
  .nav.open .mobile-lang{display:flex!important;margin:8px 0 0}
  .brand{min-width:auto}
  .hero-content{padding:110px 22px 170px}
  .journey-panel{margin-top:-108px;padding:20px;border-radius:26px}
  .activities{grid-template-columns:1fr}
  .stamp-grid{grid-template-columns:repeat(2,1fr)}
  .section{padding-left:18px;padding-right:18px}
  .modal-grid{grid-template-columns:1fr}
  .detail-hero h2{font-size:2.2rem}
}
</style>
</head>

<body>
<nav class="nav" id="nav">
  <a class="brand" href="javascript:goHome('home')">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21c4.5-4.7 6.8-8.8 6.8-12.3A6.8 6.8 0 0 0 5.2 8.7C5.2 12.2 7.5 16.3 12 21Z"/><path d="M12 17V8"/><path d="M12 12c-2.8 0-5-1.5-6-4"/><path d="M12 12c2.8 0 5-1.5 6-4"/></svg>
    </div>
    <div><h1 data-i="brandTitle"></h1><span>RURAL HEALING PASSPORT</span></div>
  </a>
  <div class="nav-links">
    <a class="nav-link active" onclick="goHome('home')" data-i="navHome"></a>
    <a class="nav-link" onclick="goHome('journey')" data-i="navJourney"></a>
    <a class="nav-link" onclick="goHome('activities')" data-i="navActivities"></a>
    <a class="nav-link" onclick="goHome('passport')" data-i="navPassport"></a>
    <a class="nav-link" onclick="goHome('stories')" data-i="navStories"></a>
    <a class="nav-link" onclick="goHome('community')" data-i="navCommunity"></a>
    <div class="lang-switch mobile-lang">
      <span class="lang-label" data-i="language"></span>
      <button class="lang-btn active" onclick="setLang('zh')">中</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日</button>
    </div>
  </div>
  <div class="member"><div class="avatar"></div><span data-i="member"></span></div>
  <div class="lang-switch">
    <span class="lang-label" data-i="language"></span>
    <button class="lang-btn active" onclick="setLang('zh')">中</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ja')">日</button>
  </div>
  <button class="menu-btn" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
</nav>

<main id="homePage">
  <section class="hero" id="home">
    <div class="hero-img"></div>
    <div class="hero-content">
      <div class="kicker">✦ CHOOSE YOUR JOURNEY</div>
      <h2 data-i-html="heroTitle"></h2>
      <p data-i="heroDesc"></p>
      <div class="cta-row">
        <button class="btn btn-primary" onclick="goHome('journey')" data-i="startJourney"></button>
        <button class="btn btn-ghost" onclick="goHome('activities')" data-i="directActivity"></button>
      </div>
    </div>
  </section>

  <section class="journey-panel reveal" id="journey">
    <div class="panel-head">
      <div><h3 data-i="journeyTitle"></h3><p data-i="journeyDesc"></p></div>
      <span class="tiny-btn" data-i="freeChoose"></span>
    </div>
    <div class="journey-grid" id="journeyGrid"></div>
  </section>

  <section class="section reveal" id="activities">
    <div class="section-title"><div><h2 data-i="activityTitle"></h2><p data-i="activityDesc"></p></div></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCards('all',this)" data-i="filterAll"></button>
      <button class="filter-btn" onclick="filterCards('short',this)" data-i="filterShort"></button>
      <button class="filter-btn" onclick="filterCards('day',this)" data-i="filterDay"></button>
      <button class="filter-btn" onclick="filterCards('stay',this)" data-i="filterStay"></button>
      <button class="filter-btn" onclick="filterCards('food',this)" data-i="filterFood"></button>
    </div>
    <div class="activities" id="activityList"></div>
  </section>

  <section class="section reveal" id="passport">
    <div class="section-title"><div><h2 data-i="passportTitle"></h2><p data-i="passportDesc"></p></div></div>
    <div class="passport-section">
      <div class="passport-card">
        <h3 style="font-family:'Noto Serif TC',serif;color:var(--deep);font-size:1.7rem;margin:0" data-i="overview"></h3>
        <p style="color:var(--muted);line-height:1.8" data-i="overviewDesc"></p>
        <div class="stats">
          <div class="stat"><strong>6</strong><span data-i="expCount"></span></div>
          <div class="stat"><strong>3</strong><span data-i="placeCount"></span></div>
          <div class="stat"><strong>2</strong><span data-i="seasonCount"></span></div>
        </div>
        <div class="stamp-overview"></div>
        <div class="passport-cover"><h3 data-i="passportCover"></h3><p>RURAL HEALING PASSPORT</p></div>
      </div>
      <div class="glass-card">
        <div class="passport-tabs">
          <button class="tab active" onclick="switchStamp('visit',this)" data-i="visitTab"></button>
          <button class="tab" onclick="switchStamp('place',this)" data-i="placeTab"></button>
          <button class="tab" onclick="switchStamp('season',this)" data-i="seasonTab"></button>
          <button class="tab" onclick="switchStamp('reward',this)" data-i="rewardTab"></button>
        </div>
        <div id="stampContent"></div>
      </div>
    </div>
  </section>

  <section class="section reveal" id="stories">
    <div class="section-title">
      <div><h2 data-i="storyTitle"></h2><p data-i="storyDesc"></p></div>
      <button class="tiny-btn" onclick="openDetail('stories')" data-i="moreStories"></button>
    </div>
    <div class="story-community">
      <article class="story-card" onclick="openDetail('storyAcong')">
        <div class="story-content">
          <h3 data-i="acongTitle"></h3>
          <p data-i="acongQuote"></p>
          <span class="tiny-btn" style="background:rgba(255,255,255,.18);color:white;border-color:rgba(255,255,255,.38)" data-i="readStory"></span>
        </div>
      </article>
      <div class="glass-card" id="community">

belong:{img:"belong.jpg",tag:{zh:"Belong｜成為夥伴",en:"Belong｜Become a Partner",ja:"Belong｜仲間になる"},title:{zh:"不只來一次，而是持續支持",en:"Not Just One Visit, but Ongoing Support",ja:"一度だけでなく、継続的に支える"},desc:{zh:"透過護照、回購、會員與季節活動，讓關係延續。",en:"Passport, repurchase, membership, and seasonal activities keep the relationship alive.",ja:"パスポート、再購入、会員、季節イベントで関係を続ける。"},time:{zh:"持續參與",en:"Ongoing",ja:"継続参加"},stars:3,people:{zh:"回訪者、會員、產地支持者",en:"Return visitors, members, local supporters",ja:"再訪者、会員、産地支援者"},next:{zh:"推薦依據你的護照收集情況，前往尚未拜訪的合作農家。",en:"Recommendations guide you to farms you have not visited yet.",ja:"未訪問の協力農家をおすすめします。"},body:{zh:["用農村護照記錄每一次來訪、每一個地點與每一個季節。","集滿一定數量可兌換折扣、限定農產品、特殊路線或長住優惠。","網站會根據章數推薦下一次適合的旅程。","透過回購與會員制度，把體驗轉化為對農家的長期信任。","每個人的旅程不同，但都能成為土地關係的一部分。"],en:["Record every visit, place, and season in the Rural Passport.","Exchange stamps for discounts, limited products, special routes, or Long Stay benefits.","The site recommends next journeys based on collected stamps.","Turn experience into long-term trust through repurchase and membership.","Every journey is different, but each becomes part of a land relationship."],ja:["農村パスポートで訪問、場所、季節を記録する。","一定数のスタンプで割引、限定農産物、特別ルート、長期滞在特典と交換できる。","集めたスタンプに基づき次の旅をおすすめする。","再購入と会員制度で農家への長期的な信頼に変える。","旅は人それぞれでも、土地との関係の一部になる。"]}},
stories:{img:"story.jpg",tag:{zh:"Stories｜農村故事",en:"Stories｜Rural Stories",ja:"Stories｜農村の物語"},title:{zh:"更多農村故事",en:"More Rural Stories",ja:"もっと農村の物語"},desc:{zh:"故事是活動前期待感的來源，也是體驗後回流的理由。",en:"Stories build anticipation before activities and reasons to return after them.",ja:"物語は体験前の期待感を作り、体験後の再訪理由になる。"},time:{zh:"隨時閱讀",en:"Anytime",ja:"いつでも"},stars:1,people:{zh:"所有使用者",en:"All users",ja:"すべての利用者"},next:{zh:"讀完故事後，可選擇相關體驗活動。",en:"After reading, choose related experiences.",ja:"読後に関連体験を選べます。"},body:{zh:["農夫的一天：理解真實生活節奏。","參與者心得：看見不同人的療癒旅程。","食物從哪裡來：把餐桌與土地連起來。","四季記錄：理解農村每次來都不一樣。","故事頁可連回相關體驗活動與農村護照。"],en:["A farmer’s day: understand real rural rhythm.","Participant reflections: see different healing journeys.","Where food comes from: connect table and land.","Season records: rural life changes every visit.","Stories link back to experiences and the passport."],ja:["農家の一日：本当の生活リズムを知る。","参加者の感想：それぞれの癒しの旅を見る。","食べ物はどこから来るか：食卓と土地を結ぶ。","四季の記録：訪れるたび農村は違う。","物語ページは関連体験とパスポートへつながる。"]}},
storyAcong:{img:"acong.jpg",tag:{zh:"Farmer Story｜阿聰",en:"Farmer Story｜Acong",ja:"Farmer Story｜阿聰"},title:{zh:"阿聰的自然田",en:"Acong’s Natural Field",ja:"阿聰の自然田"},desc:{zh:"從自然農法到生活選擇，體驗背後是一種生活態度。",en:"From natural farming to life choices, the experience carries a way of living.",ja:"自然農法から暮らしの選択へ、体験の背後には生活態度がある。"},time:{zh:"2 分鐘閱讀",en:"2 min read",ja:"2分で読める"},stars:1,people:{zh:"想理解農法與信念的人",en:"People interested in farming values",ja:"農法と信念を知りたい人"},next:{zh:"可預約插秧初體驗或農夫的一天。",en:"Book Rice Planting or A Day as a Farmer.",ja:"田植え体験や農家の一日を予約できます。"},body:{zh:["阿聰的自然田不只是生產空間，也是一種生活選擇。","故事可以放農夫照片、訪談摘要與短影片。","用真實語句帶出農法、土地與生活態度。","頁面最後連回相關體驗，讓故事成為預約入口。","也可收藏故事，成為行前期待的一部分。"],en:["Acong’s field is not only production space, but a life choice.","The page can include photos, interview summaries, and short videos.","Real words reveal farming methods, land, and lifestyle.","The page links back to related experiences as booking entrances.","Users can save stories as part of pre-trip anticipation."],ja:["阿聰の畑は生産空間であるだけでなく、暮らしの選択でもある。","農家写真、インタビュー要約、短い動画を載せられる。","本当の言葉で農法、土地、生活態度を伝える。","最後に関連体験へ戻り、物語を予約入口にする。","物語を保存し、出発前の期待感にできる。"]}}
};

details.seedling={...details.experience,img:"rice.jpg",tag:activities[0].tag,title:activities[0].title,desc:activities[0].desc,time:{zh:"2.5 小時",en:"2.5 hours",ja:"2.5時間"},stars:2,people:{zh:"親子、第一次體驗者",en:"Families and beginners",ja:"親子・初心者"},next:{zh:"下一次可嘗試農夫的一天。",en:"Next, try A Day as a Farmer.",ja:"次は農家の一日に挑戦できます。"},body:{zh:["農場導覽：認識稻田、季節與當天任務。","插秧操作：實際進入田裡，完成一小區秧苗。","食農小教室：理解一碗飯背後的等待與照顧。","飯糰手作：把體驗轉成可吃、可帶走的成果。","獲得回訪章與當季季節章。"],en:["Farm tour: learn about rice fields, seasons, and the day’s task.","Rice planting: enter the field and plant seedlings.","Food class: understand the waiting and care behind rice.","Rice ball craft: turn the experience into something edible and take-away.","Receive visit and season stamps."],ja:["農場案内：田んぼ、季節、当日の任務を知る。","田植え：実際に田んぼに入り苗を植える。","食農ミニ講座：一杯のご飯の背景にある待つことと世話を知る。","おにぎり作り：食べられ、持ち帰れる成果にする。","再訪スタンプと季節スタンプを獲得する。"]}};

function tr(obj){return obj[currentLang]||obj.zh||obj}
function imgUrl(name){return `url("images/${name}")`}
function starText(n){return "★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n)}

function setLang(lang){
  currentLang=lang;
  document.documentElement.lang=lang==="zh"?"zh-Hant":lang;
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.toggle("active",(lang==="zh"&&b.textContent==="中")||(lang==="en"&&b.textContent==="EN")||(lang==="ja"&&b.textContent==="日")));
  document.querySelectorAll("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));
  document.querySelectorAll("[data-i-html]").forEach(el=>el.innerHTML=t(el.dataset.iHtml));
  document.getElementById("inputName").placeholder=t("inputName");
  document.getElementById("peopleSelect").innerHTML=t("peopleOptions").map(x=>`<option>${x}</option>`).join("");
  renderJourney();renderActivities();renderStamps(currentStampType);renderCommunity();updateBackBtn();
}

function renderJourney(){
  document.getElementById("journeyGrid").innerHTML=journey.map(j=>`
    <article class="journey-card" onclick="openDetail('${j.key}')">
      <small>${j.level}</small><div class="journey-icon">${j.icon}</div>
      <h4>${tr(j.title)}</h4><p>${tr(j.desc)}</p><span class="tiny-btn">${t("more")}</span>
    </article>`).join("");
}
function renderActivities(){
  document.getElementById("activityList").innerHTML=activities.map(a=>`
    <article class="activity-card" data-type="${a.type}" onclick="openDetail('${a.key}')">
      <div class="img-slot" style="--card-img:${imgUrl(a.img)}"></div>
      <div class="activity-body">
        <span class="tag">${tr(a.tag)}</span><h3>${tr(a.title)}</h3><p>${tr(a.desc)}</p>
        <div class="meta">${tr(a.meta).map(m=>`<span>◎ ${m}</span>`).join("")}</div>
        <div class="price-row"><span class="price">${a.price}</span><button class="book-btn" onclick="event.stopPropagation();openBooking('${tr(a.title)}')">${t("bookThis")}</button></div>
      </div>
    </article>`).join("");
}
function renderCommunity(){
  document.getElementById("communityFeed").innerHTML=community[currentLang].map(p=>`<div class="post"><div class="avatar"></div><div><b>${p[0]}</b><p>${p[1]}</p></div></div>`).join("");
}

function openDetail(key){
  const d=details[key]||details.discover;
  detailBackTarget=activities.some(a=>a.key===key)?"activities":(key==="stories"||key==="storyAcong")?"stories":key==="__stamp"?"passport":"journey";
  document.getElementById("homePage").style.display="none";
  document.getElementById("detailPage").classList.add("active");
  document.getElementById("detailHero").style.setProperty("--detail-img",imgUrl(d.img));
  document.getElementById("detailTag").textContent=tr(d.tag);
  document.getElementById("detailTitle").textContent=tr(d.title);
  document.getElementById("detailDesc").textContent=tr(d.desc);
  document.getElementById("detailBody").innerHTML=`<div class="timeline">${tr(d.body).map((x,i)=>`<div class="step"><div class="dot">${i+1}</div><p style="margin:2px 0 0;line-height:1.8;color:var(--muted);font-weight:700">${x}</p></div>`).join("")}</div>`;
  document.getElementById("detailInfo").innerHTML=`
    <div class="info-pill"><span>${t("time")}</span><b>${tr(d.time)}</b></div>
    <div class="info-pill"><span>${t("difficulty")}</span><b class="stars">${starText(d.stars)}</b></div>
    <div class="info-pill"><span>${t("target")}</span><b>${tr(d.people)}</b></div>`;
  document.getElementById("detailNext").textContent=tr(d.next);
  updateBackBtn();
  window.scrollTo(0,0);
}
function updateBackBtn(){
  const b=document.getElementById("detailBackBtn");
  if(!b)return;
  b.textContent=detailBackTarget==="activities"?t("backActivities"):detailBackTarget==="passport"?t("backPassport"):detailBackTarget==="stories"?t("backStories"):t("backJourney");
}

function openStampDetail(type,index){
  const s=stamps[type][index];
  details.__stamp={
    img:s.img,tag:{zh:type==="place"?"合作農家":type==="season"?"季節章":"回訪章",en:type==="place"?"Partner Farm":type==="season"?"Season Stamp":"Visit Stamp",ja:type==="place"?"協力農家":type==="season"?"季節スタンプ":"再訪スタンプ"},
    title:s.name,desc:s.desc,time:s.sub,stars:s.done?2:1,people:{zh:"所有會員",en:"All members",ja:"すべての会員"},next:s.desc,
    body:{zh:[tr(s.desc),"這枚章會出現在你的農村護照中，記錄你與土地互動的一頁。","集滿一定數量後，可兌換折扣、Long Stay 優惠、限定農產品或特殊路線。"],en:[tr(s.desc),"This stamp appears in your Rural Passport and records one page of your land journey.","Collect enough stamps to unlock discounts, Long Stay benefits, limited products, or special routes."],ja:[tr(s.desc),"このスタンプは農村パスポートに表示され、土地との旅の一ページを記録します。","一定数を集めると割引、長期滞在特典、限定農産物、特別ルートを解除できます。"]}
  };
  openDetail("__stamp");
}
function renderStamps(type="visit"){
  currentStampType=type;
  const el=document.getElementById("stampContent");
  if(type==="reward"){
    el.innerHTML=`<div class="reward-list">${rewards[currentLang].map((r,i)=>`<div class="reward"><div><b>${r[0]}</b><br><span>${r[1]}</span></div><div class="progress"><i style="width:${[100,100,75,60][i]}%"></i></div></div>`).join("")}</div><br><div class="placeholder-note">${currentLang==="zh"?"推薦下一站：秋穗稻米一日體驗<br>理由：你還沒有秋季章":currentLang==="en"?"Next recommendation: Autumn rice experience<br>Reason: You have not collected the autumn stamp yet":"次のおすすめ：秋穂の稲作体験<br>理由：秋のスタンプがまだありません"}</div>`;
    return;
  }
  el.innerHTML=`<div class="stamp-grid">${stamps[type].map((s,i)=>`<div class="stamp ${s.done?"done":""}" onclick="openStampDetail('${type}',${i})"><div class="stamp-img" style="--stamp-img:${imgUrl(s.img)}"></div><b>${tr(s.name)}</b><small>${tr(s.sub)}</small></div>`).join("")}</div>`;
}
function switchStamp(type,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  renderStamps(type);
}
function filterCards(type,btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".activity-card").forEach(card=>card.style.display=(type==="all"||card.dataset.type.includes(type))?"block":"none");
}
function goHome(target="home"){
  document.getElementById("detailPage").classList.remove("active");
  document.getElementById("homePage").style.display="block";
  setTimeout(()=>{const el=document.getElementById(target);if(el){window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-88,behavior:"smooth"})}},40);
}
function openBooking(name){
  document.getElementById("bookingTitle").textContent=t("booking")+name;
  document.getElementById("bookingModal").classList.add("active");
}
function closeBooking(){document.getElementById("bookingModal").classList.remove("active")}

setLang("zh");
const io=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show")}),{threshold:.12});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script>
</body>
</html>
