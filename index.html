const journeys=[{id:"discover",en:"Discover",img:"journey-0.jpg",zh:["認識農村","從故事、季節與路線開始，先讓自己慢慢進入農村的節奏。"],enText:["Discover","Begin with stories, seasons, and routes before entering the rural rhythm."],ja:["農村を知る","物語、季節、路線から農村のリズムに入ります。"],detail:{zh:["適合第一次接觸農村療癒護照的人。這段旅程會先帶你看見農家如何生活、作物如何跟著季節變化，以及活動當天會經過哪些場域。你可以從地圖、故事和照片開始，不急著預約，先找到自己真正想靠近的土地。",["閱讀三篇農家故事，認識不同農法與生活態度。","查看本季開放的農場、作物與推薦時段。","收藏感興趣的路線，之後再回來預約。"],["推薦時間：15 分鐘瀏覽","適合對象：第一次來訪、想先了解的人","可獲得：行前收藏與路線推薦"]],en:["Ideal for first-time visitors to the Rural Healing Passport. This journey introduces how farmers live, how crops change with seasons, and what spaces you will enter during a visit. You can begin with maps, stories, and photos before booking anything.",["Read three farm stories and learn different farming values.","Browse seasonal farms, crops, and recommended visiting times.","Save routes that interest you and return when ready to book."],["Time needed: 15-minute browse","Best for: first-time visitors","Unlocks: saved routes and recommendations"]],ja:["農村ヒーリングパスポートを初めて見る人に向いています。農家の暮らし、季節ごとの作物、訪問する場所を知り、予約前に地図、物語、写真から始められます。",["三つの農家物語を読み、農法と価値観を知る。","今季の農場、作物、おすすめ時間を見る。","気になる路線を保存し、後で予約する。"],["所要時間：15分閲覧","対象：初めての訪問者","解放：保存路線とおすすめ"]]}} ,{id:"experience",en:"Experience",img:"journey-1.jpg",zh:["體驗活動","半日採收、插秧、飯糰手作，用輕鬆方式開始第一枚章。"],enText:["Experience","Start your first stamp with harvests, rice planting, or rice-ball workshops."],ja:["体験する","収穫、田植え、おにぎり作りで最初の章を集める。"],detail:{zh:["這是最容易開始的一段。你不需要有農事經驗，只要帶著願意弄髒手的心情，就能跟著農家完成採收、插秧、清洗、手作或共食。活動時間短，節奏輕鬆，很適合朋友、親子或第一次想接觸土地的人。",["抵達後由農家帶路，認識當天作物與工具。","完成一項季節農務，從身體感受土地。","用餐點或手作把體驗帶回日常。"],["時間長度：2 至 3 小時","適合對象：親子、朋友、輕度旅人","可獲得：回訪章或季節章"]],en:["This is the easiest way to begin. No farming experience is needed. Follow the farmer through harvest, planting, washing, making, or shared meals in a light and friendly pace.",["Meet the farmer and learn the crop and tools of the day.","Complete one seasonal farm task through hands-on practice.","Bring the experience home through food or a small handmade result."],["Duration: 2 to 3 hours","Best for: families, friends, light travelers","Stamp: visit or season stamp"]],ja:["最も始めやすい入口です。農作業経験は必要ありません。農家と一緒に収穫、田植え、洗浄、手作り、共食を軽いペースで体験します。",["農家に案内され、作物と道具を知る。","季節の農作業を一つ体験する。","食べ物や手作りで体験を日常へ持ち帰る。"],["時間：2から3時間","対象：親子、友人、軽い旅人","章：再訪章または季節章"]]}} ,{id:"understand",en:"Understand",img:"journey-2.jpg",zh:["理解食農","把作物生命週期、農法選擇與餐桌連起來。"],enText:["Understand","Connect crop life cycles, farming choices, and the table."],ja:["食農を理解する","作物の周期、農法、食卓をつなげる。"],detail:{zh:["如果你不只想玩，也想知道食物從哪裡來，這段旅程會很適合。你會看見農家為什麼選擇某種農法、如何面對天氣與病蟲害，也會理解一份餐點背後的時間、風險與照顧。",["走進田區或工作室，認識作物的生命週期。","聽農家分享農法選擇與日常判斷。","用當季食材完成一份共食或小料理。"],["時間長度：半日到一日","適合對象：食農教育、學校團體、深度旅人","可獲得：地點章與食農筆記"]],en:["For visitors who want more than a fun activity, this journey shows where food comes from. You will learn why farmers choose certain methods, how weather and pests are handled, and how much care sits behind one meal.",["Enter the field or studio and learn the crop life cycle.","Hear the farmer explain farming choices and daily decisions.","Cook or share a meal with seasonal ingredients."],["Duration: half day to full day","Best for: food education, schools, deep travelers","Stamp: place stamp and food notes"]],ja:["遊ぶだけでなく食べ物の背景を知りたい人に向いています。農法の選択、天候や害虫への対応、一食の裏にある時間と世話を学びます。",["畑や作業場で作物の生命周期を学ぶ。","農家から農法と日々の判断を聞く。","旬の食材で料理や共食を行う。"],["時間：半日から一日","対象：食農教育、学校、深い旅人","章：場所章と食農メモ"]]}} ,{id:"participate",en:"Participate",img:"journey-3.jpg",zh:["深入參與","一日農夫與兩日慢生活，進入農村真正的時間感。"],enText:["Participate","Enter rural time through day farming and slow two-day stays."],ja:["深く参加する","一日農家と二日間の滞在で農村時間に入る。"],detail:{zh:["這段旅程不是趕景點，而是把自己放進農村的一天。你會在清晨或午後跟著任務行動，可能是整理田區、採收、分裝、巡水或準備餐食。夜晚與清晨也會被保留下來，讓你感受城市裡很少出現的安靜。",["依當季農務加入一日或兩日任務。","與農家共食，理解工作與生活如何連在一起。","完成慢生活紀錄，帶走屬於自己的農村節奏。"],["時間長度：1 至 2 天","適合對象：想放慢、想深度體驗的人","可獲得：回訪章、地點章、季節章"]],en:["This journey is not about rushing between spots. You place yourself inside a rural day, joining tasks such as field care, harvest, packing, water checks, or meal preparation. Evenings and mornings are kept slow so you can feel a quieter rhythm.",["Join one-day or two-day seasonal farm tasks.","Share meals and see how work connects with daily life.","Complete a slow-living record for your passport."],["Duration: 1 to 2 days","Best for: slow travelers and deeper learners","Stamp: visit, place, and season stamps"]],ja:["観光地を急いで回る旅ではなく、農村の一日に入る旅です。畑の整理、収穫、包装、水の確認、食事準備などに参加し、夜と朝の静けさも味わいます。",["季節の農作業に一日または二日参加する。","共食を通して仕事と暮らしのつながりを見る。","スローライフ記録を完成する。"],["時間：1から2日","対象：ゆっくり深く体験したい人","章：再訪章、場所章、季節章"]]}} ,{id:"belong",en:"Belong",img:"journey-4.jpg",zh:["成為夥伴","回訪、長住、回購與志工實習，形成長期支持。"],enText:["Belong","Return, stay, purchase, and volunteer as long-term support."],ja:["仲間になる","再訪、滞在、購入、ボランティアで長く支える。"],detail:{zh:["當你已經來過幾次，農村就不只是目的地。這段旅程適合想 Long Stay、志工實習或持續支持農家的你。你會以更穩定的方式參與農務，也可能協助紀錄、導覽、包裝、社群或季節活動。",["提交 Long Stay 或志工實習申請。","與農家確認可參與的任務與住宿節奏。","用回訪、回購或共作延續與農村的關係。"],["時間長度：7 至 21 天","適合對象：長住、志工、深度支持者","可獲得：夥伴章與限定獎勵"]],en:["After several visits, the village becomes more than a destination. This journey is for Long Stay guests, volunteers, and supporters who want to participate more steadily through farm tasks, records, guiding, packing, media, or seasonal events.",["Submit a Long Stay or volunteer application.","Confirm tasks, stay rhythm, and expectations with the farm.","Continue the relationship through return visits, purchases, or co-work."],["Duration: 7 to 21 days","Best for: long-stay guests and volunteers","Stamp: partner stamp and limited rewards"]],ja:["何度か訪れると、農村は目的地以上の存在になります。Long Stay、ボランティア、継続的な支援を望む人が、農作業、記録、案内、包装、発信、季節行事に参加します。",["Long Stayまたはボランティアに申請する。","農家と作業、滞在リズム、期待を確認する。","再訪、購入、共作で関係を続ける。"],["時間：7から21日","対象：長期滞在者、ボランティア","章：仲間章と限定特典"]]}}];
const activities=[{id:"rice",stage:"Experience",img:"rice.jpg",price:{zh:"NT$680",en:"NT$680",ja:"NT$680"},zh:["插秧初體驗","不是踩泥巴而已，而是理解一碗飯背後的季節、等待與照顧。","2.5 小時｜親子友善｜春耕章"],en:["Rice Planting Intro","Not just mud play, but learning the season and care behind a bowl of rice.","2.5 hours｜Family friendly｜Spring stamp"],ja:["田植え初体験","泥遊びだけでなく、一杯のご飯の季節と世話を知る。","2.5時間｜親子向け｜春耕章"],detail:{zh:["赤腳踩進水田時，稻米不再只是餐桌上的白飯。你會跟著農家認識秧苗、田水與插秧距離，理解春天為什麼需要耐心，也會用飯糰手作把體驗帶回日常。",["稻田導覽與安全說明。","插秧示範與分區實作。","稻米小教室與飯糰手作。","獲得春耕章與第一次回訪章。"],["集合時間：上午 9:30","建議穿著：可弄髒的短褲、防曬帽","適合年齡：6 歲以上"]],en:["Step barefoot into the paddy and rice becomes more than food on the table. Learn seedlings, water, spacing, and the patience of spring, then bring the experience home through rice-ball making.",["Paddy tour and safety briefing.","Rice planting demo and hands-on practice.","Rice learning session and rice-ball workshop.","Collect a spring stamp and first visit stamp."],["Start time: 9:30 AM","Wear: clothes that can get muddy and a sun hat","Age: 6+"]],ja:["裸足で田んぼに入ると、米は食卓の白米だけではなくなります。苗、水、間隔、春の忍耐を学び、おにぎり作りで体験を持ち帰ります。",["田んぼ案内と安全説明。","田植え実演と実作業。","米の小教室とおにぎり作り。","春耕章と初回再訪章を獲得。"],["集合：午前9:30","服装：汚れてよい服と帽子","年齢：6歳以上"]]}} ,{id:"day",stage:"Understand",img:"farm-day.jpg",price:{zh:"NT$1,480",en:"NT$1,480",ja:"NT$1,480"},zh:["農夫的一天","從清晨任務、共食到真人圖書館，完整感受農夫工作節奏。","6 小時｜中度體驗｜地點章"],en:["A Day as a Farmer","Feel the rhythm of farm work from morning tasks to shared meals.","6 hours｜Moderate｜Place stamp"],ja:["農家の一日","朝の作業から共食まで、農家のリズムを感じる。","6時間｜中程度｜場所章"],detail:{zh:["這不是表演式體驗，而是跟著農夫完成一天裡真正需要被做完的事。你可能會除草、採收、整理工具、備料或分裝，也會在午餐時聽農家談農法選擇與生活。",["上午依季節加入農務任務。","中午以當季食材共食。","下午進行農夫真人圖書館與護照紀錄。","獲得合作農家的地點章。"],["集合時間：上午 8:30","體力程度：中等，需要長時間站立","適合對象：想深入理解農家日常的人"]],en:["This is not a staged activity. You follow the farmer through tasks that truly need to be done, such as weeding, harvesting, tool care, preparation, or packing, then talk about farming choices over lunch.",["Join seasonal farm tasks in the morning.","Share a lunch made with seasonal ingredients.","Join a farmer story session and passport note-taking.","Collect the farm's place stamp."],["Start time: 8:30 AM","Physical level: moderate, standing required","Best for: visitors who want real farm rhythm"]],ja:["演出された体験ではなく、その日に本当に必要な仕事に参加します。草取り、収穫、道具整理、準備、包装などを行い、昼食で農法と暮らしを聞きます。",["午前は季節の農作業に参加。","昼は旬の食材で共食。","午後は農家の話とパスポート記録。","農家の場所章を獲得。"],["集合：午前8:30","体力：中程度、立ち作業あり","対象：農家の日常を知りたい人"]]}} ,{id:"slow",stage:"Participate",img:"slow-life.jpg",price:{zh:"NT$3,800",en:"NT$3,800",ja:"NT$3,800"},zh:["農村慢生活","兩日一夜把夜晚、清晨、村莊散步與農務放進同一趟療癒旅程。","2 天 1 夜｜深度放慢｜季節章"],en:["Slow Rural Living","Two days of village walks, evening stories, dawn, and fieldwork.","2 days 1 night｜Slow stay｜Season stamp"],ja:["農村スローライフ","一泊二日で夜、朝、村歩き、農作業を味わう。","1泊2日｜スロー滞在｜季節章"],detail:{zh:["把手機放慢，把身體交給村莊的時間。白天參與農務，傍晚散步到水圳或田埂，晚上聽農家說故事，隔天清晨再回到田裡。這趟旅程適合想真正休息的人。",["第一天下午抵達與村莊散步。","傍晚共食與農家故事時間。","第二天清晨觀察田區與完成季節農務。","獲得季節章與慢生活紀錄。"],["住宿：合作民宿或農家空間","餐食：一晚餐、一早餐","提醒：名額少，建議提前預約"]],en:["Slow your phone, and let your body follow village time. Join farm work in the day, walk along canals or field paths at dusk, listen to farm stories at night, and return to the field the next morning.",["Arrive in the afternoon and walk through the village.","Share dinner and listen to farm stories.","Observe the field at dawn and complete seasonal work.","Collect a season stamp and slow-living record."],["Stay: partner guesthouse or farm space","Meals: one dinner and one breakfast","Note: limited seats, early booking suggested"]],ja:["スマホを少し離し、身体を村の時間に預けます。昼は農作業、夕方は水路や畦道を散歩、夜は農家の物語、翌朝は再び畑へ戻ります。",["午後到着と村歩き。","夕食と農家の物語時間。","翌朝の畑観察と季節作業。","季節章とスローライフ記録を獲得。"],["宿泊：提携民宿または農家空間","食事：夕食1回、朝食1回","注意：少人数制、早めの予約推奨"]]}} ,{id:"stay",stage:"Belong",img:"long-stay.jpg",price:{zh:"申請制",en:"Application",ja:"申請制"},zh:["Long Stay 計畫","以協作者身分參與長期農務，從旅人變成能被農村記住的人。","7 至 21 天｜申請制｜夥伴章"],en:["Long Stay Program","Join long-term farm work as a collaborator, not a visitor.","7 to 21 days｜Application｜Partner stamp"],ja:["Long Stay計画","旅人ではなく協働者として長期農作業に参加する。","7から21日｜申請制｜仲間章"],detail:{zh:["Long Stay 適合已經參與過至少一次體驗，並想更穩定地靠近農村的人。你會依照農家需求加入工作，也會用紀錄、協助導覽或包裝等方式支持產地。",["填寫申請並說明可停留時間。","與合作農家確認工作內容與住宿規範。","每週完成一次田野紀錄或協作任務。","結束後獲得夥伴章與 Long Stay 優惠。"],["申請門檻：需完成至少 1 次體驗","停留天數：7 至 21 天","適合對象：志工、實習、深度旅人"]],en:["Long Stay is for people who have joined at least one experience and want a steadier relationship with the countryside. You participate in farm tasks and may support records, guiding, packing, or local communication.",["Submit an application with your available dates.","Confirm work, stay rules, and expectations with the farm.","Complete a weekly field note or co-working task.","Receive a partner stamp and Long Stay benefit."],["Requirement: at least one prior experience","Stay length: 7 to 21 days","Best for: volunteers, interns, deep travelers"]],ja:["Long Stayは、一度以上体験に参加し、農村とより安定した関係を持ちたい人向けです。農作業に参加し、記録、案内、包装、発信も支えます。",["滞在可能日を記入して申請。","農家と作業、宿泊規則、期待を確認。","毎週フィールド記録または協作任務を行う。","終了後、仲間章とLong Stay特典を獲得。"],["条件：一回以上の体験参加","滞在：7から21日","対象：ボランティア、実習、深い旅人"]]}}];
const stories=[{id:"storyA",img:"farmer-story.jpg",zh:["阿聰的自然田","從自然農法到生活選擇，體驗背後是一種和土地相處的方式。"],en:["Acong's Natural Field","Natural farming is not only a method, but a way to live with land."],ja:["阿聰の自然田","自然農法は方法だけでなく、土地と暮らす姿勢です。"],detail:{zh:["阿聰的田沒有急著把雜草清得一乾二淨。他相信田裡的昆蟲、水氣和土壤都有自己的位置。來到這裡，你會看見農法不是口號，而是一種每天做選擇的生活。",["走進自然農法稻田，觀察田裡的共生環境。","聽阿聰分享為什麼選擇少干預的耕作方式。","用一碗飯理解時間、土地與人的互相照顧。"],["推薦活動：插秧初體驗","故事時間：2 分鐘","適合章：春耕章、回訪章"]],en:["Acong does not rush to remove every weed from his field. He believes insects, water, and soil each have a place. Here, farming is not a slogan but a daily way of choosing how to live.",["Walk through a natural rice field and observe coexistence.","Hear why Acong chooses low-intervention farming.","Understand care between land and people through a bowl of rice."],["Recommended: Rice Planting Intro","Reading time: 2 minutes","Stamp: spring and visit stamps"]],ja:["阿聰は田んぼの草をすべて取り除こうとはしません。虫、水、土にもそれぞれの場所があると考えます。ここでは農法は標語ではなく、毎日の選択です。",["自然農法の田を歩き、共生環境を観察する。","低介入の農法を選ぶ理由を聞く。","一杯のご飯で土地と人の世話を理解する。"],["おすすめ：田植え初体験","読書時間：2分","章：春耕章、再訪章"]]}} ,{id:"storyB",img:"story-lotus.jpg",zh:["水月蓮藕田","一支蓮藕從泥裡被拔起，也把水田、餐桌與身體的感受連起來。"],en:["Lotus Root Field","A lotus root connects wetland, table, and body through harvest."],ja:["水月蓮根田","蓮根の収穫が湿地、食卓、身体感覚をつなぐ。"],detail:{zh:["水月蓮藕田最迷人的地方，是看不見的地方最多。蓮藕藏在泥裡，採收時必須靠手感慢慢摸索。這段體驗讓人重新理解濕地作物，也理解食物抵達餐桌前的重量。",["穿上防水裝備，認識蓮藕田環境。","觀察採藕方式與清洗流程。","品嘗蓮藕料理，理解從泥到餐桌的路徑。"],["推薦活動：農夫的一天","故事時間：3 分鐘","適合章：地點章、夏收章"]],en:["The charm of a lotus field is that much of it is hidden. Lotus roots stay under the mud and must be found by touch. This story reconnects wetland crops with the weight of food before it reaches the table.",["Wear waterproof gear and learn the wetland environment.","Observe lotus harvesting and cleaning.","Taste lotus dishes and follow the path from mud to table."],["Recommended: A Day as a Farmer","Reading time: 3 minutes","Stamp: place and summer stamps"]],ja:["蓮根田の魅力は、見えない部分が多いことです。蓮根は泥の中にあり、手の感覚で探します。湿地作物と食卓までの重さを知る物語です。",["防水装備で蓮根田を知る。","収穫と洗浄の流れを観察する。","蓮根料理を味わい、泥から食卓までをたどる。"],["おすすめ：農家の一日","読書時間：3分","章：場所章、夏収章"]]}} ,{id:"storyC",img:"story-slow-island.jpg",zh:["慢島生活","在島嶼邊緣住下幾天，把早晨、晚風、農務與人的故事慢慢收進身體裡。"],en:["Slow Island Living","Stay near the island edge and let mornings, wind, farm work, and stories settle into the body."],ja:["スロー島暮らし","島の端に滞在し、朝、風、農作業、人の物語を身体に入れる。"],detail:{zh:["慢島生活不是安排滿滿的旅程，而是把空白留給人。你可能早上去田裡，下午幫忙整理農產品，傍晚走到海風或溪流旁。留得越久，越能感覺農村不是風景，而是日常。",["入住合作民宿或農家空間。","依季節加入農務、整理或共食準備。","用日記記錄每天遇見的人、作物與氣味。"],["推薦活動：農村慢生活、Long Stay 計畫","故事時間：3 分鐘","適合章：冬藏章、夥伴章"]],en:["Slow Island Living is not a packed itinerary. It leaves space for people. You may work in the field in the morning, help sort produce in the afternoon, and walk near wind or water at dusk. The longer you stay, the more the village becomes daily life.",["Stay in a partner guesthouse or farm space.","Join seasonal farm work, sorting, or meal preparation.","Keep a diary of people, crops, and scents you meet."],["Recommended: Slow Rural Living and Long Stay","Reading time: 3 minutes","Stamp: winter and partner stamps"]],ja:["スロー島暮らしは予定を詰め込む旅ではありません。人のために余白を残します。朝は畑、午後は農産物整理、夕方は風や水辺を歩きます。長くいるほど農村は風景ではなく日常になります。",["提携民宿または農家空間に滞在。","季節の農作業、整理、食事準備に参加。","出会った人、作物、香りを日記に残す。"],["おすすめ：農村スローライフ、Long Stay","読書時間：3分","章：冬蔵章、仲間章"]]}}];
const stampSets={visit:[["visit1","visit-01.jpg",["初見土地","第 1 次回來，留下第一個與土地相遇的痕跡。"],["First Encounter","Your first trace of meeting the land."],["土地との初対面","土地と出会った最初の記録。"]],["visit3","visit-03.jpg",["土地熟人","第 3 次回來，你開始認得農場的節奏與人。"],["Familiar Visitor","By the third visit, you recognize people and rhythm."],["土地の顔なじみ","三回目で人とリズムが見えてくる。"]],["visit5","visit-05.jpg",["農村夥伴","第 5 次回來，農村不再只是目的地，而是關係。"],["Rural Partner","By the fifth visit, the village becomes a relationship."],["農村の仲間","五回目で農村は目的地ではなく関係になる。"]],["visit10","visit-10.jpg",["長期守護者","第 10 次回來，解鎖特殊路線與深度共作。"],["Long-term Guardian","Unlock special routes and deeper collaboration."],["長期の守り手","特別ルートと深い協働を解放する。"]]],place:[["place1","place-01.jpg",["阿聰自然田","自然農法稻田，適合理解米食與留種精神。"],["Acong Field","Natural rice field for rice culture and seed-saving."],["阿聰の自然田","米文化と採種を知る自然農法の田。"]],["place2","place-02.jpg",["水月蓮藕田","從採藕、清洗到料理，理解水田作物。"],["Lotus Field","Harvest, wash, and cook lotus roots from wetland farms."],["水月蓮根田","蓮根の収穫、洗浄、料理を学ぶ。"]],["place3","place-03.jpg",["香草療癒園","用氣味、觸摸與料理進入草本療癒。"],["Herb Garden","Enter herbal healing through scent, touch, and food."],["ハーブ園","香り、触覚、料理で草本の癒しへ。"]],["place4","place-04.jpg",["溪流生態點","觀察水生植物與昆蟲，把農村延伸到生態。"],["Stream Ecology","Observe aquatic plants and insects beyond the farm."],["渓流生態地点","水生植物と昆虫を観察する。"]],["place5","place-05.jpg",["米食共作屋","把米變成飯糰、米香與共食記憶。"],["Rice Workshop House","Turn rice into rice balls, snacks, and shared memories."],["米食工房","米をおにぎり、米菓、共食の記憶にする。"]],["place6","place-06.jpg",["慢島生活屋","長住與志工實習基地，適合深度停留。"],["Slow Stay House","Base for long stays, volunteering, and rural learning."],["スロー滞在の家","長期滞在とボランティアの拠点。"]]],season:[["spring","season-spring.jpg",["春耕章","播種、插秧與認識新生命，適合第一次來。"],["Spring Farming","Sowing, planting, and meeting new life."],["春耕章","種まき、田植え、新しい命に出会う。"]],["summer","season-summer.jpg",["夏收章","採收、補水與烈日下的農務節奏。"],["Summer Harvest","Harvesting, hydration, and summer farm rhythm."],["夏収章","収穫、水分補給、夏の農作業リズム。"]],["autumn","season-autumn.jpg",["秋穗章","收割、曬穀與等待之後的成果。"],["Autumn Grain","Harvest, drying grain, and results after patience."],["秋穂章","収穫、乾燥、待つことの成果。"]],["winter","season-winter.jpg",["冬藏章","保存、整地與為下一季做準備。"],["Winter Storage","Preserving, organizing, and preparing the next season."],["冬蔵章","保存、整地、次の季節への準備。"]]]};

const detailPages={route:{tag:{zh:"推薦路線",en:"Recommended routes",ja:"おすすめ路線"},img:"route-01.jpg",gallery:routeImages,zh:["先看看這趟旅程會遇見什麼","你可以從季節、農家與作物開始選路線。春天適合插秧與播種，夏天適合採收與水田作物，秋天適合稻穗與曬穀，冬天則適合保存、整地與慢生活。上方大圖會自動播放 10 張旅程照片，下方也有一組清楚的照片輪播可以慢慢看。",["依照可停留時間選擇半日、一日、兩日或 Long Stay。","查看每條路線會遇見的農家、作物與護照章。","使用上方與下方輪播瀏覽 10 張不同路線照片。","收藏路線後，可以回到活動區預約最適合的體驗。"],["首頁輪播：route-01.jpg 到 route-10.jpg","詳細頁上方：10 張照片自動輪播","詳細頁下方：10 張照片可手動切換","推薦下一步：選擇精選活動"]],en:["See what this journey will bring","Choose routes by season, farmer, and crop. Spring is for planting, summer for harvest and wetland crops, autumn for rice grains, and winter for preserving, field care, and slow living. The top hero cycles through 10 route photos, and a second clear photo carousel appears below.",["Choose half-day, full-day, two-day, or Long Stay by your available time.","See which farmers, crops, and passport stamps belong to each route.","Browse 10 different route photos in both the top and lower carousels.","Save a route, then return to the experience section to book."],["Homepage carousel: route-01.jpg to route-10.jpg","Detail hero: 10 auto-rotating photos","Lower gallery: 10 manually controlled photos","Next step: choose a featured experience"]],ja:["この旅で出会うものを先に見る","季節、農家、作物から路線を選べます。春は田植え、夏は収穫と水田作物、秋は稲穂と乾燥、冬は保存、整地、スローライフに向いています。上部の大きな写真は10枚で自動再生し、下にも見やすい写真輪播があります。",["滞在時間に合わせて半日、一日、二日、Long Stayを選ぶ。","各路線の農家、作物、パスポート章を見る。","上部と下部の輪播で10枚の路線写真を見る。","路線を保存し、体験区で予約する。"],["ホーム輪播：route-01.jpg から route-10.jpg","詳細上部：10枚の自動輪播","下部ギャラリー：10枚を手動切替","次：おすすめ体験を選ぶ"]]},stampPlay:{tag:{zh:"集章玩法",en:"Stamp rewards",ja:"スタンプ特典"},img:"stamp-play.jpg",zh:["每一次參與，都會留下下一次回來的理由。","護照不是單純紀念品，而是你的農村旅程記錄。你完成活動後會得到回訪章、地點章或季節章；章越多，越能解鎖折扣、限定農產品、Long Stay 優惠與特殊路線。",["完成活動後，由合作農家確認章的類型。","回到護照頁查看已收集章與下一站推薦。","集滿指定數量後，預約時可使用對應獎勵。"],["首頁圖片：stamp-play.jpg","詳細頁圖片：stamp-play.jpg","可解鎖：折扣、限定農產品、Long Stay、特殊路線"]],en:["Every visit gives you a reason to return.","The passport is not only a souvenir. It records your rural journey. After each experience, you receive a visit, place, or season stamp. More stamps unlock discounts, limited farm products, Long Stay benefits, and hidden routes.",["After an activity, the partner farm confirms the stamp type.","Return to the passport page to view collected stamps and recommendations.","Use unlocked rewards when booking eligible experiences."],["Homepage image: stamp-play.jpg","Detail image: stamp-play.jpg","Unlocks: discounts, limited products, Long Stay, hidden routes"]],ja:["参加するたび、また戻る理由が増えます。","パスポートは記念品だけではありません。農村の旅の記録です。体験後、再訪章、場所章、季節章を受け取り、章が増えると割引、限定農産物、Long Stay特典、隠し路線が解放されます。",["体験後、提携農家が章の種類を確認。","パスポートページで集めた章とおすすめを見る。","予約時に解放された特典を使う。"],["ホーム画像：stamp-play.jpg","詳細画像：stamp-play.jpg","解放：割引、限定農産物、Long Stay、隠し路線"]]},allStamps:{tag:{zh:"全部章冊",en:"All stamps",ja:"全スタンプ"},img:"all-stamps.jpg",zh:["14 枚章，收藏你回到農村的每一步。","這張圖會展示護照裡全部章的樣貌：4 枚回訪章、6 枚地點章、4 枚季節章。它會出現在首頁的護照封面，也會出現在這個詳細頁。",["回訪章記錄你來過幾次。","地點章記錄你走訪過哪些合作農家。","季節章記錄春耕、夏收、秋穗、冬藏。"],["首頁圖片：all-stamps.jpg","詳細頁圖片：all-stamps.jpg","章數：14 枚"]],en:["Fourteen stamps collect every step of your rural return.","This image shows all passport stamps: 4 visit stamps, 6 place stamps, and 4 season stamps. It appears on the homepage passport cover and on this detail page.",["Visit stamps record how often you return.","Place stamps record partner farms you visit.","Season stamps record spring, summer, autumn, and winter."],["Homepage image: all-stamps.jpg","Detail image: all-stamps.jpg","Total: 14 stamps"]],ja:["14枚の章が農村へ戻る歩みを記録します。","この画像は全てのパスポート章を示します。再訪章4枚、場所章6枚、季節章4枚です。ホームのパスポート表紙とこの詳細ページに表示されます。",["再訪章は訪問回数を記録。","場所章は訪れた提携農家を記録。","季節章は春、夏、秋、冬を記録。"],["ホーム画像：all-stamps.jpg","詳細画像：all-stamps.jpg","合計：14枚"]]}}; 
function t(k){return copy[lang][k]||k}function tr(obj){return obj[lang]||obj.zh}
function setLang(l){lang=l;document.documentElement.lang=l==="zh"?"zh-Hant":l;document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("active",(l==="zh"&&b.textContent==="中")||(l==="en"&&b.textContent==="EN")||(l==="ja"&&b.textContent==="日")));document.querySelectorAll("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));document.querySelectorAll("[data-i-html]").forEach(el=>el.innerHTML=t(el.dataset.iHtml));detailContentTitle.textContent=t("detailContent");detailInfoTitle.textContent=t("info");renderJourney();renderActivities();renderStamps(currentStamp);renderStories();renderRewards()}
function names(item){return lang==="zh"?item.zh:lang==="en"?item.enText||item.en:item.ja}
const stageLabels={Experience:{zh:"體驗活動",en:"Experience",ja:"体験"},Understand:{zh:"理解食農",en:"Understand",ja:"理解"},Participate:{zh:"深入參與",en:"Participate",ja:"参加"},Belong:{zh:"成為夥伴",en:"Belong",ja:"仲間"}};
function renderJourney(){journeyPath.innerHTML=journeys.map((j,i)=>{const p=names(j);return `<article class="milestone" onclick="openJourney('${j.id}')"><div class="num">${i+1}</div><div><small>${p[0]}</small><h3>${p[0]}</h3><p>${p[1]}</p></div></article>`}).join("")}
function renderActivities(){activityCards.innerHTML=activities.map(a=>{const p=tr(a);return `<article class="card" onclick="openActivity('${a.id}')"><div class="pic" style="--img:url('images/${a.img}')"></div><div class="body"><span class="tag">${stageLabels[a.stage][lang]}</span><h3>${p[0]}</h3><p>${p[1]}</p><div class="meta"><span>${p[2]}</span></div><div class="actions"><span class="price">${a.price[lang]}</span><button class="linebtn">${t("details")}</button></div></div></article>`}).join("")}
function renderStories(){const f=stories[0],fp=tr(f);featureStoryTitle.textContent=fp[0];featureStoryDesc.textContent=fp[1];storyList.innerHTML=stories.slice(1).map(s=>{const p=tr(s);return `<article class="story-mini" onclick="openStory('${s.id}')"><div class="story-thumb" style="--img:url('images/${s.img}')"></div><div><span class="tag">${t("storyTag")}</span><h3>${p[0]}</h3><p>${p[1]}</p></div></article>`}).join("")}
let currentStamp="visit";function stampName(s){return lang==="zh"?s[2]:lang==="en"?s[3]:s[4]}function renderStamps(type="visit",btn){currentStamp=type;if(btn){document.querySelectorAll(".stamp-tabs button").forEach(b=>b.classList.remove("active"));btn.classList.add("active")}stampGrid.innerHTML=stampSets[type].map(s=>{const p=stampName(s);return `<article class="stamp" onclick="openStamp('${type}','${s[0]}')"><div class="stampimg" style="--img:url('images/${s[1]}')"></div><b>${p[0]}</b><p>${p[1]}</p></article>`}).join("")}
function renderRewards(){rewardPanel.innerHTML=rewards[lang].map((r,i)=>`<div class="reward"><b>${r[0]}</b><p>${r[1]}</p><div class="bar"><i style="width:${[100,88,75,60][i]}%"></i></div></div>`).join("")}
function openJourney(id){const j=journeys.find(x=>x.id===id);openCustom(names(j)[0],names(j)[0],j.detail[lang][0],j.img,j.detail[lang][1],j.detail[lang][2])}
function openActivity(id){const a=activities.find(x=>x.id===id),p=tr(a);openCustom(stageLabels[a.stage][lang],p[0],a.detail[lang][0],a.img,a.detail[lang][1],a.detail[lang][2])}
function openStory(id){const s=stories.find(x=>x.id===id),p=tr(s);openCustom(t("storyTag"),p[0],s.detail[lang][0],s.img,s.detail[lang][1],s.detail[lang][2])}
function openStamp(type,id){const s=stampSets[type].find(x=>x[0]===id),p=stampName(s),tab=type==="visit"?t("visitTab"):type==="place"?t("placeTab"):t("seasonTab");const detail={zh:[p[1],["完成符合條件的體驗後，就能把這枚章收進護照。","章會記錄你的回訪、地點或季節進度。","累積章數可解鎖折扣、限定農產品與特殊路線。"],["章冊類型："+tab,"狀態：可集章","圖片檔名："+s[1]]],en:[p[1],["Complete an eligible experience to collect this stamp.","The stamp records your visit, place, or season progress.","Collect more stamps to unlock discounts, limited products, and hidden routes."],["Stamp type: "+tab,"Status: collectable","Image file: "+s[1]]],ja:[p[1],["条件に合う体験を完了すると、この章を集められます。","章は再訪、場所、季節の進行を記録します。","章を集めると割引、限定農産物、特別路線が解放されます。"],["章の種類："+tab,"状態：収集可能","画像ファイル："+s[1]]]};openCustom(tab,p[0],detail[lang][0],s[1],detail[lang][1],detail[lang][2])}
const carousels={homeRoute:{images:routeImages,index:0,target:"routePanel",dots:"routeDots"},detailTop:{images:[],index:0,target:"detailHero",dots:"detailTopDots"},detailBottom:{images:[],index:0,target:"detailGalleryPhoto",dots:"detailBottomDots"}};
function drawCarousel(name){const c=carousels[name],el=document.getElementById(c.target);if(!el||!c.images.length)return;el.style.setProperty("--img",`url('images/${c.images[c.index]}')`);const dots=document.getElementById(c.dots);if(dots)dots.innerHTML=c.images.map((_,i)=>`<button class="${i===c.index?"active":""}" onclick="goCarousel('${name}',${i},event)"></button>`).join("")}
function goCarousel(name,index,event){event?.stopPropagation();carousels[name].index=index;drawCarousel(name)}
function shiftCarousel(name,step,event){event?.stopPropagation();const c=carousels[name];if(!c.images.length)return;c.index=(c.index+step+c.images.length)%c.images.length;drawCarousel(name)}
setInterval(()=>shiftCarousel("homeRoute",1),4200);setInterval(()=>shiftCarousel("detailTop",1),4200);setInterval(()=>shiftCarousel("detailBottom",1),5200);
function openDetail(id){const d=detailPages[id];openCustom(d.tag[lang],d[lang][0],d[lang][1],d.img,d[lang][2],d[lang][3],d.gallery||[])}
function openCustom(tag,title,desc,img,steps,info,gallery=[]){history.pushState({view:"detail",tag,title,desc,img,steps,info,gallery},"","#detail");renderDetail({tag,title,desc,img,steps,info,gallery})}
function renderDetail(d){home.classList.add("hidden");detailPage.classList.add("active");const hasGallery=Array.isArray(d.gallery)&&d.gallery.length>0;document.querySelectorAll(".detailCar").forEach(el=>el.classList.toggle("hidden",!hasGallery));if(hasGallery){carousels.detailTop.images=d.gallery;carousels.detailTop.index=0;carousels.detailBottom.images=d.gallery;carousels.detailBottom.index=0;drawCarousel("detailTop");drawCarousel("detailBottom")}else{detailHero.style.setProperty("--img",`url('images/${d.img}')`)}detailTag.textContent=d.tag;detailTitle.textContent=d.title;detailDesc.textContent=d.desc;detailContentTitle.textContent=t("detailContent");detailInfoTitle.textContent=t("info");detailSteps.innerHTML=d.steps.map((s,i)=>`<div class="step"><div class="dot">${i+1}</div><p>${s}</p></div>`).join("");detailInfo.innerHTML=d.info.map(x=>`<p><b>${x}</b></p>`).join("");scrollTo(0,0)}
function navigateHome(id){history.pushState({view:"home",id},"","#"+id);setHome(id)}function setHome(id){detailPage.classList.remove("active");home.classList.remove("hidden");requestAnimationFrame(()=>document.getElementById(id)?.scrollIntoView({behavior:"smooth",block:"start"}));nav.classList.remove("open")}function browserBack(){history.back()}window.addEventListener("popstate",e=>{if(e.state?.view==="detail")renderDetail(e.state);else setHome(e.state?.id||"top")});history.replaceState({view:"home",id:"top"},"","#top");setLang("zh");drawCarousel("homeRoute");const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("show")}),{threshold:.12});document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script>
</body>
</html>
